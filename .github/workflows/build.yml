name: Compilation automatique Multiplateforme

on:
  push:
    tags:
      - 'v*' # Se déclenche lors de la création d'un tag (ex: v1.0.6)
  workflow_dispatch: # Permet de lancer la compilation manuellement depuis GitHub

permissions:
  contents: write # Indispensable pour autoriser GitHub à publier la Release

jobs:
  build-linux:
    name: Compilation Linux
    runs-on: ubuntu-latest
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Tkinter sur le système du Runner
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install pyinstaller

    - name: Préparer le cache hors-ligne Tiktoken
      run: |
        mkdir -p tiktoken_cache
        curl -o tiktoken_cache/9b5ad71b2ce5302211f9c61530b329a4922fc6a4 https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken

    - name: Compiler le binaire Linux
      run: |
        pyinstaller --onefile --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --add-data "tiktoken_cache:tiktoken_cache" --name "fcc-wrapper-linux" app.py

    - name: Sauvegarder l'artefact Linux
      uses: actions/upload-artifact@v4
      with:
        name: binaire-linux
        path: dist/fcc-wrapper-linux

  build-windows:
    name: Compilation Windows
    runs-on: windows-latest
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install pyinstaller

    - name: Préparer le cache hors-ligne Tiktoken
      run: |
        mkdir tiktoken_cache
        curl -L -o tiktoken_cache/9b5ad71b2ce5302211f9c61530b329a4922fc6a4 https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken

    - name: Télécharger Node.js portable (Windows)
      run: |
        curl -L -o node.exe https://nodejs.org/dist/v20.11.1/win-x64/node.exe

    - name: Installer Claude Code et copier le fichier cli.js/cli.mjs
      run: |
        # On force l'installation en local dans le répertoire courant avec --prefix .
        npm install --prefix . @anthropic-ai/claude-code
        
        # Liste des noms de fichiers cibles possibles (mjs pour ES Modules, js pour version classique)
        $targets = @("cli.mjs", "cli.js")
        $cliFile = $null
        
        # 1. Recherche locale dans node_modules
        Write-Host "Recherche locale..."
        foreach ($target in $targets) {
            if (!$cliFile) {
                $cliFile = Get-ChildItem -Path "node_modules" -Filter $target -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            }
        }
        
        # 2. Recherche globale si non trouvé en local
        if (!$cliFile) {
            Write-Host "Non trouvé localement. Recherche dans le répertoire npm global de Windows..."
            $globalPath = "$env:APPDATA\npm\node_modules"
            if (Test-Path $globalPath) {
                foreach ($target in $targets) {
                    if (!$cliFile) {
                        $cliFile = Get-ChildItem -Path $globalPath -Filter $target -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                    }
                }
            }
        }
        
        # 3. Recherche désespérée globale dans tout le répertoire de travail
        if (!$cliFile) {
            Write-Host "Non trouvé dans AppData. Recherche globale dans tout le répertoire de travail..."
            foreach ($target in $targets) {
                if (!$cliFile) {
                    $cliFile = Get-ChildItem -Path "D:\a" -Filter $target -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                }
            }
        }
        
        # Copie si trouvé
        if ($cliFile) {
            # On le renomme avec l'extension .mjs pour que node.exe sache qu'il doit l'exécuter comme un ES Module
            Copy-Item -Path $cliFile.FullName -Destination "claude-cli.mjs" -Force
            Write-Host "Trouvé et copié avec succès depuis : $($cliFile.FullName)"
        } else {
            Write-Error "Erreur critique : Impossible de localiser le fichier cli.mjs ou cli.js de Claude Code sur le Runner !"
            exit 1
        }

    - name: Compiler l'exécutable Windows Autonome (Python + Node + Claude)
      run: |
        # On injecte le cache Tiktoken, le node.exe portable et le fichier JS autonome de Claude (.mjs)
        pyinstaller --onefile --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --add-data "tiktoken_cache;tiktoken_cache" --add-data "node.exe;." --add-data "claude-cli.mjs;." --name "fcc-wrapper-windows" app.py

    - name: Sauvegarder l'artefact Windows
      uses: actions/upload-artifact@v4
      with:
        name: executable-windows
        path: dist/fcc-wrapper-windows.exe

  publish-release:
    name: Publication de la Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Publie uniquement s'il s'agit d'un tag v*
    steps:
    - name: Télécharger l'artefact Linux
      uses: actions/download-artifact@v4
      with:
        name: binaire-linux
        path: ./artifacts

    - name: Télécharger l'artefact Windows
      uses: actions/download-artifact@v4
      with:
        name: executable-windows
        path: ./artifacts

    - name: Créer la Release GitHub et y attacher les fichiers
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/fcc-wrapper-linux
          ./artifacts/fcc-wrapper-windows.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
