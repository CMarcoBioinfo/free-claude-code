name: Compilation automatique Multiplateforme

on:
  push:
    tags:
      - 'v*' # Se déclenche lors de la création d'un tag (ex: v1.0.8)
  workflow_dispatch: # Permet de lancer la compilation manuellement depuis GitHub

permissions:
  contents: write # Indispensable pour autoriser GitHub à publier la Release

jobs:
  build-linux:
    name: Compilation Linux
    runs-on: ubuntu-latest
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Tkinter sur le système du Runner
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install pyinstaller

    - name: Préparer le cache hors-ligne Tiktoken
      run: |
        mkdir -p tiktoken_cache
        curl -o tiktoken_cache/9b5ad71b2ce5302211f9c61530b329a4922fc6a4 https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken

    - name: Compiler le binaire Linux
      run: |
        pyinstaller --onefile --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --add-data "tiktoken_cache:tiktoken_cache" --name "fcc-wrapper-linux" app.py

    - name: Sauvegarder l'artefact Linux
      uses: actions/upload-artifact@v4
      with:
        name: binaire-linux
        path: dist/fcc-wrapper-linux

  build-windows:
    name: Compilation Windows
    runs-on: windows-latest
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install pyinstaller

    - name: Préparer le cache hors-ligne Tiktoken
      run: |
        mkdir tiktoken_cache
        curl -L -o tiktoken_cache/9b5ad71b2ce5302211f9c61530b329a4922fc6a4 https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken

    - name: Télécharger Node.js portable (Windows)
      run: |
        curl -L -o node.exe https://nodejs.org/dist/v20.11.1/win-x64/node.exe

    - name: Installer Claude Code et copier le fichier d'exécution
      run: |
        # On force l'installation en local dans le répertoire courant avec --prefix .
        npm install --prefix . @anthropic-ai/claude-code
        
        # Recherche par taille ultra-robuste (le binaire de Claude fait entre 13Mo et 23Mo)
        # Cela évite de dépendre du nom exact (cli.js, cli.mjs, index.js) ou des sous-dossiers
        Write-Host "Recherche par taille dans node_modules/@anthropic-ai/claude-code..."
        $cliFile = Get-ChildItem -Path "node_modules/@anthropic-ai/claude-code" -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 2MB } | Select-Object -First 1
        
        # Diagnostic de sécurité si introuvable
        if (!$cliFile) {
            Write-Host "DIAGNOSTIC : Liste récursive des fichiers de claude-code..."
            if (Test-Path "node_modules/@anthropic-ai/claude-code") {
                Get-ChildItem -Path "node_modules/@anthropic-ai/claude-code" -Recurse | Select-Object Name, Length | Out-String | Write-Host
            }
            Write-Error "Erreur critique : Impossible de localiser le fichier d'exécution (> 2Mo) de Claude !"
            exit 1
        }
        
        # Copie dynamique en conservant l'extension d'origine (.js ou .mjs)
        $extension = [System.IO.Path]::GetExtension($cliFile.FullName)
        $destination = "claude-cli" + $extension
        Copy-Item -Path $cliFile.FullName -Destination $destination -Force
        
        Write-Host "Trouvé et copié avec succès ($($cliFile.Length / 1MB) Mo) depuis : $($cliFile.FullName) vers $destination"
        echo "CLAUDE_FILE=$destination" >> $env:GITHUB_ENV

    - name: Compiler l'exécutable Windows Autonome (Python + Node + Claude)
      run: |
        # On utilise dynamiquement la variable d'environnement $env:CLAUDE_FILE configurée à l'étape d'avant
        pyinstaller --onefile --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --add-data "tiktoken_cache;tiktoken_cache" --add-data "node.exe;." --add-data "$env:CLAUDE_FILE;." --name "fcc-wrapper-windows" app.py

    - name: Sauvegarder l'artefact Windows
      uses: actions/upload-artifact@v4
      with:
        name: executable-windows
        path: dist/fcc-wrapper-windows.exe

  publish-release:
    name: Publication de la Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Publie uniquement s'il s'agit d'un tag v*
    steps:
    - name: Télécharger l'artefact Linux
      uses: actions/download-artifact@v4
      with:
        name: binaire-linux
        path: ./artifacts

    - name: Télécharger l'artefact Windows
      uses: actions/download-artifact@v4
      with:
        name: executable-windows
        path: ./artifacts

    - name: Créer la Release GitHub et y attacher les fichiers
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/fcc-wrapper-linux
          ./artifacts/fcc-wrapper-windows.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
